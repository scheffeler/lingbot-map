/* ----------------------------- 3D tab ----------------------------- */
// In-browser three.js viewer. Renders the same artifacts viser does
// (cloud + frustums + pole axis + ground plane) but without spawning
// a subprocess on a second port. The legacy viser path is still
// reachable via the "Open detailed viewer" button — it triggers the
// /api/captures/{id}/view-3d endpoint and pops localhost:8080 in a
// new tab.
function ThreeDTab({ capture }) {
  const mountRef = useRef(null);
  const renderRef = useRef(null);  // imperative handle: { setLayer, dispose, ... }
  const [error, setError] = useState(null);
  const [progress, setProgress] = useState(null);   // 'scene' | 'cloud' | 'done'
  const [layers, setLayers] = useState({
    cloud: true, frustums: true, frustumImages: true,
    axis: true, groundPlane: false, alignGround: true,
    orbitTarget: true,
  });
  const [pointSize, setPointSize] = useState(0.005);
  const [busy, setBusy] = useState(false);
  const [showHelp, setShowHelp] = useState(false);

  // Detailed-viewer (viser) handoff.
  const openDetailedViewer = async () => {
    setBusy(true);
    try {
      const r = await fetch(`/api/captures/${capture.dbId}/view-3d`,
                            {method: 'POST'});
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `${r.status}`);
      // Brief wait for viser to bind 8080 before opening.
      await new Promise(res => setTimeout(res, 1200));
      window.open('http://localhost:8080', '_blank', 'noreferrer');
    } catch (e) {
      setError('viser handoff failed: ' + e.message);
    } finally {
      setBusy(false);
    }
  };

  // Mount the three.js scene when the tab opens for a capture.
  useEffect(() => {
    if (!mountRef.current) return;
    if (capture.stages.pose?.s !== 'ok') return;
    if (typeof THREE === 'undefined') {
      setError('three.js failed to load (THREE global missing).');
      return;
    }
    const missing = [];
    if (!THREE.OrbitControls) missing.push('OrbitControls');
    if (!THREE.PLYLoader) missing.push('PLYLoader');
    if (!THREE.CSS2DRenderer) missing.push('CSS2DRenderer');
    if (missing.length) {
      setError(`three.js add-ons missing: ${missing.join(', ')}. Check the CDN tags in <head>.`);
      return;
    }

    const handle = mountThreeScene({
      mount: mountRef.current,
      capture,
      onProgress: setProgress,
      onError: setError,
      initialLayers: layers,
      initialPointSize: pointSize,
    });
    renderRef.current = handle;
    return () => { handle.dispose(); renderRef.current = null; };
  }, [capture.dbId, capture.stages.pose?.s]);

  // Push layer toggles + point size into the scene without
  // remounting.
  useEffect(() => { renderRef.current?.applyLayers?.(layers); }, [layers]);
  useEffect(() => { renderRef.current?.setPointSize?.(pointSize); }, [pointSize]);

  // `?` and `h` toggle the help overlay (handled at React level so
  // the overlay state persists). Other shortcuts (F, P, 1, 3, 5, 7)
  // live inside mountThreeScene.
  useEffect(() => {
    const onKey = (e) => {
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.metaKey || e.ctrlKey) return;
      if (e.key === '?' || e.key === 'h' || e.key === 'H') {
        setShowHelp(s => !s); e.preventDefault();
      } else if (e.key === 'Escape') {
        setShowHelp(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const navBtn = {
    height: 26, padding: '0 9px', fontSize: 11.5,
    background: 'var(--bg-3)', border: '1px solid var(--line-2)',
    color: 'var(--text-2)', borderRadius: 4, cursor: 'pointer',
    display: 'inline-flex', alignItems: 'center', gap: 4,
  };

  if (capture.stages.pose?.s !== 'ok') {
    return (
      <div className="card card-pad" style={{textAlign:'center', padding:'48px 20px', color:'var(--text-3)'}}>
        Run the Pose stage to see the 3D scene.
      </div>
    );
  }

  const setLayer = (k, v) => setLayers(s => ({ ...s, [k]: v }));

  return (
    <>
      <div className="threed-status">
        <div className="left">
          <span className="pip"/>
          <span style={{fontSize:12, color:'var(--text-2)'}}>three.js viewer</span>
          <span className="url">{capture.id}{progress === 'cloud' ? ' · loading cloud…' : ''}</span>
        </div>
        <div style={{display:'flex', gap: 6, alignItems:'center', flexWrap:'wrap'}}>
          <div style={{display:'flex', gap: 4}}>
            <button style={navBtn} title="Frame all (F / R)"
              onClick={() => renderRef.current?.frameAll?.()}>Frame all</button>
            <button style={navBtn} title="Frame pole (P)"
              onClick={() => renderRef.current?.framePole?.()}>Frame pole</button>
          </div>
          <div style={{width: 1, height: 18, background:'var(--line-2)'}}/>
          <div style={{display:'flex', gap: 4}}>
            <button style={navBtn} title="Top view (7)"
              onClick={() => renderRef.current?.setView?.('top')}>Top</button>
            <button style={navBtn} title="Front view (1)"
              onClick={() => renderRef.current?.setView?.('front')}>Front</button>
            <button style={navBtn} title="Side view (3)"
              onClick={() => renderRef.current?.setView?.('right')}>Side</button>
            <button style={navBtn} title="Iso view (5)"
              onClick={() => renderRef.current?.setView?.('iso')}>Iso</button>
          </div>
          <div style={{width: 1, height: 18, background:'var(--line-2)'}}/>
          <button style={navBtn} title="Keyboard shortcuts (? or H)"
            onClick={() => setShowHelp(s => !s)}>?</button>
          <button className="btn" onClick={openDetailedViewer} disabled={busy}>
            <Icon.ext/> {busy ? 'Launching…' : 'viser'}
          </button>
        </div>
      </div>
      {error && (
        <div style={{padding:'8px 14px', background:'var(--err-soft)',
                       borderBottom:'1px solid var(--err)', color:'var(--err)',
                       fontFamily:'var(--mono)', fontSize:12}}>
          {error}
        </div>
      )}
      <div className="threed-frame" style={{padding: 0, overflow: 'hidden',
                                              position:'relative',
                                              height:'calc(100vh - 220px)'}}>
        <div ref={mountRef} style={{position:'absolute', inset:0}}/>
        {/* Hint banner — shown briefly on first load, dismissible. */}
        <div style={{position:'absolute', bottom: 12, left: 12, padding:'6px 10px',
                       background:'rgba(20,20,23,0.85)', border:'1px solid var(--line-2)',
                       borderRadius:4, fontSize:11, color:'var(--text-3)',
                       fontFamily:'var(--mono)'}}>
          drag&nbsp;to&nbsp;orbit · scroll&nbsp;zoom · double-click&nbsp;to&nbsp;recenter · <b>?</b>&nbsp;help
        </div>
        {showHelp && (
          <div onClick={() => setShowHelp(false)}
               style={{position:'absolute', inset:0,
                         background:'rgba(0,0,0,0.55)',
                         display:'flex', alignItems:'center', justifyContent:'center',
                         zIndex: 10, cursor:'pointer'}}>
            <div onClick={e => e.stopPropagation()}
                 style={{maxWidth: 460, background:'var(--bg-2)',
                           border:'1px solid var(--line-2)', borderRadius:6,
                           padding:'18px 22px', cursor:'auto'}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between',
                             marginBottom: 10}}>
                <strong style={{fontSize:13}}>3D viewer controls</strong>
                <button style={navBtn} onClick={() => setShowHelp(false)}>esc</button>
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:12,
                              fontFamily:'var(--mono)'}}>
                <tbody>
                  {[
                    ['drag', 'orbit around target'],
                    ['right-drag · shift+drag', 'pan'],
                    ['scroll', 'zoom'],
                    ['double-click', 'set orbit target where you clicked'],
                    ['F · R', 'frame all'],
                    ['P', 'frame pole'],
                    ['7', 'top view'],
                    ['1', 'front view'],
                    ['3', 'side view'],
                    ['5', 'iso view'],
                    ['? · H', 'this help'],
                    ['esc', 'close help'],
                  ].map(([k, desc], i) => (
                    <tr key={i} style={{borderBottom:'1px solid var(--line)'}}>
                      <td style={{padding:'5px 8px 5px 0', color:'var(--text-2)',
                                    whiteSpace:'nowrap'}}>{k}</td>
                      <td style={{padding:'5px 0', color:'var(--text-3)'}}>{desc}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop: 12, fontSize: 11, color:'var(--text-4)',
                             lineHeight: 1.5}}>
                Tip: turn on <b>Align to ground</b> in the Layers panel for the
                Top/Front/Side presets to mean what you'd expect — they assume
                world +Y is "up".
              </div>
            </div>
          </div>
        )}
        {/* Floating layer GUI */}
        <div style={{position:'absolute', top:12, right:12, padding:12,
                       background:'rgba(20,20,23,0.92)',
                       border:'1px solid var(--line-2)', borderRadius:6,
                       fontSize:12, minWidth: 220,
                       backdropFilter:'blur(6px)'}}>
          <div style={{color:'var(--text-3)', fontSize:11, textTransform:'uppercase',
                         letterSpacing:'0.05em', marginBottom: 8}}>Layers</div>
          {[
            ['cloud', 'Point cloud'],
            ['frustums', 'Camera frustums'],
            ['frustumImages', '  · with frame images'],
            ['axis', 'Pole axis + endpoints'],
            ['groundPlane', 'Ground plane'],
            ['alignGround', 'Align to vertical'],
            ['orbitTarget', 'Orbit target dot'],
          ].map(([k, label]) =>
            <label key={k} style={{display:'flex', alignItems:'center',
                                     gap:6, padding:'2px 0', cursor:'pointer'}}>
              <input type="checkbox" checked={layers[k]}
                     onChange={e => setLayer(k, e.target.checked)}/>
              <span>{label}</span>
            </label>
          )}
          <div style={{marginTop:10, color:'var(--text-3)', fontSize:11}}>
            Point size <span className="num" style={{color:'var(--text-2)'}}>{pointSize.toFixed(4)}</span>
          </div>
          <input type="range" min="0.001" max="0.05" step="0.001"
                 value={pointSize} onChange={e => setPointSize(parseFloat(e.target.value))}
                 style={{width:'100%'}}/>
        </div>
      </div>
    </>
  );
}

// --- three.js scene mounter ----------------------------------------
// Builds the scene imperatively (outside React's vDOM) so we don't
// rebuild every render. Returns a handle the React component can use
// to push layer toggles / point size and to dispose of WebGL state.
function mountThreeScene({ mount, capture, onProgress, onError,
                            initialLayers, initialPointSize }) {
  onError(null);
  onProgress('scene');

  const width = mount.clientWidth || 1;
  const height = mount.clientHeight || 1;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0e0e10);

  const camera = new THREE.PerspectiveCamera(60, width / height, 0.001, 1000);
  camera.position.set(2, 2, 2);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(width, height);
  mount.appendChild(renderer.domElement);

  // CSS2D label renderer overlays HTML labels on top of the canvas.
  const labelRenderer = new THREE.CSS2DRenderer();
  labelRenderer.setSize(width, height);
  Object.assign(labelRenderer.domElement.style, {
    position: 'absolute', top: '0', left: '0',
    pointerEvents: 'none',
  });
  mount.appendChild(labelRenderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  // N1: unlimited polar rotation. OrbitControls' default clamp at
  // [0, π] is the "can't drag past vertical" pain.
  controls.minPolarAngle = -Infinity;
  controls.maxPolarAngle = Infinity;
  // N5: ground-locked pan. Vertical mouse always moves world +Y,
  // horizontal moves along world XZ — feels right when the camera
  // is tilted looking down at the road.
  controls.screenSpacePanning = false;
  // N4: we install a custom wheel handler below for zoom-to-cursor.
  // Disable the default so wheel events go to ours.
  controls.enableZoom = false;

  // Containers we toggle visibility on.
  const root = new THREE.Group();
  scene.add(root);
  const cloudGroup = new THREE.Group();
  const frustumGroup = new THREE.Group();
  const axisGroup = new THREE.Group();
  const planeGroup = new THREE.Group();
  const gridGroup = new THREE.Group();
  root.add(cloudGroup, frustumGroup, axisGroup, planeGroup, gridGroup);

  // Disposal book-keeping.
  const disposables = [];
  const remember = (obj) => disposables.push(obj);

  // Ambient + directional light helps the textured frustum images
  // pop a bit from the dark background.
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 0.4);
  dl.position.set(5, 10, 7);
  scene.add(dl);

  let pointsMaterial = null;     // T3 will create
  let layers = { ...initialLayers };
  let alignmentApplied = false;
  // Hoisted state used by navigation helpers (frameAll, framePole,
  // setView, smartDefaultView, double-click target). Updated as
  // buildCloud / buildPoleAxis / buildFrustums succeed.
  let sceneBounds = null;        // { center: Vector3, radius: number }
  let poleEnds = null;           // { top: Vector3, bottom: Vector3 }
  let cameraCentres = [];        // Array<Vector3> — camera positions (local; rotated through root)
  let alignmentSource = 'none';  // 'pole' | 'plane' | 'none' — for GUI display
  // Suggested "natural" world up. When alignGround is on, the scene
  // root rotates so this points world +Y. Until alignment lands we
  // use it as a hint for preset views.
  const worldUp = new THREE.Vector3(0, 1, 0);

  // ---------- Navigation helpers (frame, presets, click-to-target) ----------
  // Convert a local-space (i.e., pre-alignment) vector into world
  // space so framing math sees the geometry where the user sees it.
  function _world(v) {
    root.updateMatrixWorld(true);
    return v.clone().applyMatrix4(root.matrixWorld);
  }
  function _currentDir() {
    // Unit vector from target → camera. Used when reframing without
    // changing the user's chosen viewing angle.
    const d = new THREE.Vector3().subVectors(camera.position, controls.target);
    if (d.lengthSq() < 1e-12) return new THREE.Vector3(1, 0.7, 1).normalize();
    return d.normalize();
  }
  function frameBox(box, opts) {
    const center = new THREE.Vector3();
    box.getCenter(center);
    const size = new THREE.Vector3();
    box.getSize(size);
    const radius = Math.max(size.x, size.y, size.z, 0.05) * 0.7;
    const dir = (opts?.dir) || _currentDir();
    controls.target.copy(center);
    camera.position.copy(center).add(dir.clone().multiplyScalar(radius * 2.2));
    if (opts?.up) camera.up.copy(opts.up);
    camera.near = Math.max(0.001, radius * 0.001);
    camera.far = radius * 80;
    camera.updateProjectionMatrix();
    controls.update();
  }
  function frameAll() {
    if (!sceneBounds) return;
    const r = sceneBounds.radius;
    const c = _world(sceneBounds.center);
    frameBox(new THREE.Box3(
      new THREE.Vector3(c.x - r, c.y - r, c.z - r),
      new THREE.Vector3(c.x + r, c.y + r, c.z + r),
    ));
  }
  function framePole() {
    if (!poleEnds) return frameAll();
    const top = _world(poleEnds.top);
    const bot = _world(poleEnds.bottom);
    const len = top.distanceTo(bot);
    const margin = Math.max(len * 0.4, 0.2);
    const box = new THREE.Box3();
    box.expandByPoint(top);
    box.expandByPoint(bot);
    box.expandByVector(new THREE.Vector3(margin, margin * 0.2, margin));
    const axis = new THREE.Vector3().subVectors(top, bot).normalize();
    let dir = new THREE.Vector3(axis.z, 0, -axis.x);
    if (dir.lengthSq() < 1e-3) dir.set(1, 0, 0);
    dir.normalize();
    frameBox(box, { dir, up: new THREE.Vector3(0, 1, 0) });
  }
  // N3: place the camera ~where the photographer was standing,
  // looking at the pole, with vertical on screen.
  function smartDefaultView() {
    if (!cameraCentres.length || !poleEnds) {
      if (poleEnds) framePole();
      else if (sceneBounds) frameAll();
      return;
    }
    const top = _world(poleEnds.top);
    const bot = _world(poleEnds.bottom);
    const poleMid = top.clone().add(bot).multiplyScalar(0.5);
    const camCentroid = new THREE.Vector3();
    cameraCentres.forEach(c => camCentroid.add(_world(c)));
    camCentroid.divideScalar(cameraCentres.length);
    let dir = camCentroid.clone().sub(poleMid);
    if (dir.lengthSq() < 1e-9) dir.set(1, 0, 0);
    dir.normalize();
    const poleLen = top.distanceTo(bot);
    const dist = Math.max(poleLen * 1.6, 0.3);
    controls.target.copy(poleMid);
    camera.position.copy(poleMid).add(dir.multiplyScalar(dist));
    camera.up.set(0, 1, 0);
    camera.near = Math.max(0.001, poleLen * 0.005);
    camera.far  = poleLen * 80;
    camera.updateProjectionMatrix();
    controls.update();
  }
  function setView(name) {
    if (!sceneBounds) return;
    const r = sceneBounds.radius * 1.6;
    const t = controls.target;
    const presets = {
      top:   { pos: [0,  r,  0], up: [0, 0, -1] },
      front: { pos: [0,  0,  r], up: [0, 1,  0] },
      back:  { pos: [0,  0, -r], up: [0, 1,  0] },
      left:  { pos: [-r, 0,  0], up: [0, 1,  0] },
      right: { pos: [r,  0,  0], up: [0, 1,  0] },
      iso:   { pos: [r * 0.7, r * 0.7, r * 0.7], up: [0, 1, 0] },
    };
    const p = presets[name];
    if (!p) return;
    camera.position.set(t.x + p.pos[0], t.y + p.pos[1], t.z + p.pos[2]);
    camera.up.set(...p.up);
    controls.update();
  }

  // Raycast on the cloud + scene to set a new orbit target.
  const _raycaster = new THREE.Raycaster();
  const _ndc = new THREE.Vector2();
  function setTargetFromClientXY(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    _ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    _ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    _raycaster.setFromCamera(_ndc, camera);
    _raycaster.params.Points.threshold = (pointsMaterial?.size || 0.005) * 4;
    let hits = [];
    if (cloudGroup.children[0]) {
      hits = _raycaster.intersectObject(cloudGroup.children[0], false);
    }
    if (!hits.length) {
      hits = _raycaster.intersectObject(root, true);
    }
    if (!hits.length) return false;
    controls.target.copy(hits[0].point);
    controls.update();
    return true;
  }

  function applyVisibility() {
    cloudGroup.visible = !!layers.cloud;
    frustumGroup.visible = !!layers.frustums;
    axisGroup.visible = !!layers.axis;
    planeGroup.visible = !!layers.groundPlane;
    gridGroup.visible = !!layers.alignGround;
    // Frustum textures live on child mesh nodes tagged ".isFrustumImage".
    frustumGroup.traverse(o => {
      if (o.userData?.isFrustumImage) o.visible = !!layers.frustumImages;
    });
  }
  function applyAlignment(quat, translateY) {
    if (quat) {
      root.quaternion.copy(quat);
      root.position.set(0, translateY ?? 0, 0);
    } else {
      root.quaternion.identity();
      root.position.set(0, 0, 0);
    }
  }

  // ---------- T3: Point cloud ----------
  function buildCloud(plyArrayBuffer) {
    const loader = new THREE.PLYLoader();
    let geometry;
    try {
      geometry = loader.parse(plyArrayBuffer);
    } catch (e) {
      onError('failed to parse PLY: ' + e.message);
      return;
    }
    geometry.computeBoundingBox();
    const center = new THREE.Vector3();
    geometry.boundingBox.getCenter(center);
    const size = new THREE.Vector3();
    geometry.boundingBox.getSize(size);
    const radius = Math.max(size.x, size.y, size.z, 0.5) * 0.7;

    pointsMaterial = new THREE.PointsMaterial({
      size: initialPointSize,
      vertexColors: !!geometry.attributes.color,
      sizeAttenuation: true,
    });
    if (!geometry.attributes.color) {
      pointsMaterial.color = new THREE.Color(0xc8c8d0);
    }
    const points = new THREE.Points(geometry, pointsMaterial);
    cloudGroup.add(points);
    remember(geometry);
    remember(pointsMaterial);

    // Stash bounds so navigation helpers (Frame All, presets) can
    // reach them. Initial framing happens in `load()` once everything
    // (cloud + pole) has loaded — gives us a chance to prefer
    // framePole() when a pole is present.
    sceneBounds = { center: center.clone(), radius };
    camera.near = Math.max(0.001, radius * 0.001);
    camera.far = radius * 80;
    camera.updateProjectionMatrix();
  }

  // ---------- T4: Camera frustums + textures ----------
  function buildFrustums(cameras, imageHw) {
    if (!cameras || !cameras.length) return;
    const palette = (i) => {
      const u = i / Math.max(cameras.length - 1, 1);
      return new THREE.Color(
        0.2 + 0.6 * u,
        0.7 - 0.5 * u,
        0.9 - 0.4 * u,
      );
    };
    const padH = imageHw[0], padW = imageHw[1];
    const nearDepth = 0.15;   // model-unit length of the frustum
    cameraCentres = [];                  // reset per build

    cameras.forEach((cam, i) => {
      const K = cam.intrinsic;
      const E = cam.extrinsic;     // c2w (3x4)
      const fx = K[0][0], fy = K[1][1];
      const cx = K[0][2], cy = K[1][2];

      // Pixel corners of the image, back-projected into camera-space
      // direction vectors at depth = nearDepth.
      const corners = [
        [0, 0], [padW, 0], [padW, padH], [0, padH],
      ].map(([u, v]) => {
        const x = (u - cx) / fx * nearDepth;
        const y = (v - cy) / fy * nearDepth;
        const z = nearDepth;
        return new THREE.Vector3(x, y, z);
      });

      // c2w transform: world = R @ cam + t.
      const R = new THREE.Matrix3().set(
        E[0][0], E[0][1], E[0][2],
        E[1][0], E[1][1], E[1][2],
        E[2][0], E[2][1], E[2][2],
      );
      const t = new THREE.Vector3(E[0][3], E[1][3], E[2][3]);
      const cornersWorld = corners.map(c => c.clone().applyMatrix3(R).add(t));
      const eye = t.clone();
      cameraCentres.push(eye.clone());

      // Wireframe edges: 4 from eye to corners + 4 around the near plane.
      const linePts = [];
      cornersWorld.forEach(c => { linePts.push(eye, c); });
      for (let j = 0; j < 4; j++) {
        linePts.push(cornersWorld[j], cornersWorld[(j + 1) % 4]);
      }
      const geom = new THREE.BufferGeometry().setFromPoints(linePts);
      const mat = new THREE.LineBasicMaterial({ color: palette(i) });
      const lines = new THREE.LineSegments(geom, mat);
      frustumGroup.add(lines);
      remember(geom); remember(mat);

      // Textured plane on the near plane. Texture is loaded async.
      const planeGeom = new THREE.BufferGeometry();
      const verts = new Float32Array([
        cornersWorld[0].x, cornersWorld[0].y, cornersWorld[0].z,
        cornersWorld[1].x, cornersWorld[1].y, cornersWorld[1].z,
        cornersWorld[2].x, cornersWorld[2].y, cornersWorld[2].z,
        cornersWorld[3].x, cornersWorld[3].y, cornersWorld[3].z,
      ]);
      const idx = new Uint16Array([0, 1, 2, 0, 2, 3]);
      const uv = new Float32Array([0, 0, 1, 0, 1, 1, 0, 1]);
      planeGeom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      planeGeom.setIndex(new THREE.BufferAttribute(idx, 1));
      planeGeom.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
      planeGeom.computeVertexNormals();

      const placeholder = new THREE.MeshBasicMaterial({
        color: 0x222227, side: THREE.DoubleSide, transparent: true, opacity: 0.6,
      });
      const planeMesh = new THREE.Mesh(planeGeom, placeholder);
      planeMesh.userData.isFrustumImage = true;
      frustumGroup.add(planeMesh);
      remember(planeGeom); remember(placeholder);

      // Async-load the photo and swap the material.
      const tl = new THREE.TextureLoader();
      tl.load(cam.frame_url, (tex) => {
        tex.colorSpace = THREE.SRGBColorSpace || THREE.LinearSRGBColorSpace;
        tex.flipY = false;
        const mat = new THREE.MeshBasicMaterial({
          map: tex, side: THREE.DoubleSide,
        });
        planeMesh.material = mat;
        planeMesh.material.needsUpdate = true;
        remember(tex); remember(mat);
      }, undefined, () => { /* keep placeholder on error */ });
    });
    applyVisibility();
  }

  // ---------- T5: Pole axis + ground plane + labels ----------
  function buildPoleAxis(pole, metricScale) {
    if (!pole || !pole.top || !pole.bottom) return;
    const top = new THREE.Vector3(...pole.top);
    const bot = new THREE.Vector3(...pole.bottom);
    poleEnds = { top: top.clone(), bottom: bot.clone() };
    // N2: register the pole-axis candidate. The axis points from
    // bottom → top (visualize_pole.py convention; verified by sign
    // checks against camera-up). We map that to world +Y.
    const poleUp = new THREE.Vector3().subVectors(top, bot).normalize();
    if (poleUp.lengthSq() > 1e-6) {
      const target = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(poleUp, target);
      // Translate so the pole bottom lands at world y=0.
      const botRotated = bot.clone().applyQuaternion(quat);
      _poleAlignmentCandidate = {
        quaternion: quat,
        translateY: -botRotated.y,
        source: 'pole',
      };
    }
    const axisGeom = new THREE.BufferGeometry().setFromPoints([bot, top]);
    const axisMat = new THREE.LineBasicMaterial({
      color: 0xe8c547, linewidth: 2,
    });
    axisGroup.add(new THREE.Line(axisGeom, axisMat));
    remember(axisGeom); remember(axisMat);

    const sphereR = 0.025;
    const topGeom = new THREE.SphereGeometry(sphereR, 16, 12);
    const topMat = new THREE.MeshBasicMaterial({ color: 0xff5050 });
    const topMesh = new THREE.Mesh(topGeom, topMat);
    topMesh.position.copy(top);
    axisGroup.add(topMesh);
    remember(topGeom); remember(topMat);

    const botGeom = new THREE.SphereGeometry(sphereR, 16, 12);
    const botMat = new THREE.MeshBasicMaterial({ color: 0x50c8ff });
    const botMesh = new THREE.Mesh(botGeom, botMat);
    botMesh.position.copy(bot);
    axisGroup.add(botMesh);
    remember(botGeom); remember(botMat);

    // Floating CSS2D labels.
    const mkLabel = (text) => {
      const div = document.createElement('div');
      div.textContent = text;
      Object.assign(div.style, {
        background: 'rgba(20,20,23,0.85)',
        color: '#e6e6ea',
        padding: '2px 6px',
        borderRadius: '3px',
        font: '12px JetBrains Mono, monospace',
        whiteSpace: 'nowrap',
        border: '1px solid rgba(255,255,255,0.1)',
      });
      return new THREE.CSS2DObject(div);
    };
    const heightTxt = (pole.height_m != null)
      ? `top  ${pole.height_m.toFixed(2)} m`
      : (pole.height_model_units != null
         ? `top  ${pole.height_model_units.toFixed(3)} units`
         : 'top');
    const topLabel = mkLabel(heightTxt);
    topLabel.position.copy(top).add(new THREE.Vector3(0, 0.06, 0));
    axisGroup.add(topLabel);
    const botLabel = mkLabel('bottom (0 m)');
    botLabel.position.copy(bot).add(new THREE.Vector3(0, 0.06, 0));
    axisGroup.add(botLabel);
  }

  function buildGroundPlane(plane, metricScale) {
    if (!plane || !plane.normal) return;
    const n = new THREE.Vector3(...plane.normal).normalize();
    const offset = plane.offset || 0;
    // A point on the plane closest to origin = n * offset.
    const planeOrigin = n.clone().multiplyScalar(offset);
    // Build an orthonormal basis (u, v) in the plane.
    const helper = Math.abs(n.y) < 0.9
      ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
    const u = new THREE.Vector3().crossVectors(n, helper).normalize();
    const v = new THREE.Vector3().crossVectors(n, u);
    const halfSize = 1.5;        // ~23 m at our test capture's scale
    const corners = [
      planeOrigin.clone().addScaledVector(u, halfSize).addScaledVector(v, halfSize),
      planeOrigin.clone().addScaledVector(u, -halfSize).addScaledVector(v, halfSize),
      planeOrigin.clone().addScaledVector(u, -halfSize).addScaledVector(v, -halfSize),
      planeOrigin.clone().addScaledVector(u, halfSize).addScaledVector(v, -halfSize),
    ];
    const verts = new Float32Array(corners.flatMap(c => [c.x, c.y, c.z]));
    const idx = new Uint16Array([0, 1, 2, 0, 2, 3]);
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geom.setIndex(new THREE.BufferAttribute(idx, 1));
    const mat = new THREE.MeshBasicMaterial({
      color: 0xffdc64, opacity: 0.18, transparent: true, side: THREE.DoubleSide,
    });
    planeGroup.add(new THREE.Mesh(geom, mat));
    remember(geom); remember(mat);

    // Compute the alignment quaternion that takes `n` → world +Y.
    const target = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(n, target);
    // Build a 1-meter grid IN the plane (pre-alignment), then it
    // inherits the alignment rotation along with the rest of root.
    if (metricScale) {
      const unitPerM = 1.0 / metricScale;
      const n2 = 5;
      const lines = [];
      for (let k = -n2; k <= n2; k++) {
        // A line parallel to u at v = k*unitPerM.
        const a = planeOrigin.clone()
          .addScaledVector(u, -n2 * unitPerM)
          .addScaledVector(v, k * unitPerM);
        const b = planeOrigin.clone()
          .addScaledVector(u, +n2 * unitPerM)
          .addScaledVector(v, k * unitPerM);
        lines.push(a, b);
        // Parallel to v.
        const c = planeOrigin.clone()
          .addScaledVector(v, -n2 * unitPerM)
          .addScaledVector(u, k * unitPerM);
        const d = planeOrigin.clone()
          .addScaledVector(v, +n2 * unitPerM)
          .addScaledVector(u, k * unitPerM);
        lines.push(c, d);
      }
      const gGeom = new THREE.BufferGeometry().setFromPoints(lines);
      const gMat = new THREE.LineBasicMaterial({ color: 0x507850, transparent: true, opacity: 0.6 });
      gridGroup.add(new THREE.LineSegments(gGeom, gMat));
      remember(gGeom); remember(gMat);
    }

    // Stash the plane-derived alignment as a candidate. The
    // best-source choice happens in `computeAndApplyAlignment()`
    // after every artifact has loaded — pole.axis_dir wins when
    // available because it's more stable on sparse captures.
    _planeAlignmentCandidate = {
      quaternion: quat,
      translateY: -offset,
      source: 'plane',
    };
  }
  let storedAlignment = null;
  let _planeAlignmentCandidate = null;
  let _poleAlignmentCandidate = null;

  // N2: pick the most reliable "up" reference and apply it.
  // Pole axis (from triangulate_pole) > ground-plane RANSAC > none.
  function computeAndApplyAlignment() {
    const cand = _poleAlignmentCandidate || _planeAlignmentCandidate;
    if (!cand) {
      alignmentSource = 'none';
      storedAlignment = null;
      return;
    }
    storedAlignment = cand;
    alignmentSource = cand.source;
    if (layers.alignGround) {
      applyAlignment(storedAlignment.quaternion, storedAlignment.translateY);
      alignmentApplied = true;
    }
  }

  // ---------- Fetch + build everything ----------
  async function load() {
    try {
      const sr = await fetch(`/api/captures/${capture.dbId}/scene`);
      if (!sr.ok) {
        const e = await sr.json().catch(() => ({}));
        throw new Error(e.detail || `${sr.status}`);
      }
      const sceneData = await sr.json();
      buildFrustums(sceneData.cameras, sceneData.image_hw);
      buildPoleAxis(sceneData.pole, sceneData.metric_scale);
      buildGroundPlane(sceneData.ground_plane, sceneData.metric_scale);
      applyVisibility();

      // PLY (16+ MB) is fetched separately so the rest of the scene
      // pops in immediately.
      onProgress('cloud');
      const pr = await fetch(`/api/captures/${capture.dbId}/ply`);
      if (pr.ok) {
        const buf = await pr.arrayBuffer();
        buildCloud(buf);
      }
      // N2: now that pole + plane are both built, pick the best
      // alignment source and apply it. Pole-axis wins when available.
      computeAndApplyAlignment();
      // N3: smart default vantage from camera centroid + pole. Falls
      // back to framePole / frameAll if those aren't available.
      smartDefaultView();
      onProgress('done');
    } catch (e) {
      onError(e.message);
    }
  }
  load();

  // ---------- N6: orbit-target indicator ----------
  // Tiny yellow sphere drawn at controls.target. Lives in the OUTER
  // scene (not under root) so it stays in world coords regardless of
  // alignment toggles. Fades out after ~1.2 s of no input.
  const targetMarkerGeom = new THREE.SphereGeometry(1, 12, 8);
  const targetMarkerMat = new THREE.MeshBasicMaterial({
    color: 0xe8c547, transparent: true, opacity: 0.9,
    depthTest: false,
  });
  const targetMarker = new THREE.Mesh(targetMarkerGeom, targetMarkerMat);
  targetMarker.renderOrder = 999;        // draw above everything
  scene.add(targetMarker);
  remember(targetMarkerGeom);
  remember(targetMarkerMat);
  let _markerLastInput = performance.now();
  let _markerVisualOpacity = 0.9;
  function _bumpMarker() { _markerLastInput = performance.now(); }
  controls.addEventListener('change', _bumpMarker);
  renderer.domElement.addEventListener('pointerdown', _bumpMarker);

  // ---------- Axis gizmo (corner overlay) ----------
  const gizmoScene = new THREE.Scene();
  const gizmoCam = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
  // AxesHelper: red=+X, green=+Y, blue=+Z. Same colors three.js uses
  // everywhere.
  const gizmoAxes = new THREE.AxesHelper(1);
  gizmoScene.add(gizmoAxes);
  remember(gizmoAxes.geometry);
  const gizmoSize = 96;
  const gizmoMargin = 14;
  const _gizmoDir = new THREE.Vector3();

  // ---------- Interaction: double-click sets orbit target ----------
  function _onDblClick(ev) {
    if (setTargetFromClientXY(ev.clientX, ev.clientY)) {
      ev.preventDefault();
    }
  }
  renderer.domElement.addEventListener('dblclick', _onDblClick);

  // ---------- N4: zoom-to-cursor wheel handler ----------
  // Replaces OrbitControls' default dolly (which always zooms toward
  // controls.target). Each notch moves both camera and target toward
  // (or away from) whatever 3D point sits under the mouse.
  function _anchorFromMouse(ev) {
    const rect = renderer.domElement.getBoundingClientRect();
    _ndc.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    _ndc.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    _raycaster.setFromCamera(_ndc, camera);
    _raycaster.params.Points.threshold = (pointsMaterial?.size || 0.005) * 4;
    if (cloudGroup.children[0]) {
      const hits = _raycaster.intersectObject(cloudGroup.children[0], false);
      if (hits.length) return hits[0].point.clone();
    }
    const hits = _raycaster.intersectObject(root, true);
    if (hits.length) return hits[0].point.clone();
    // No hit → fall back to the plane perpendicular to the view at
    // controls.target distance, intersected by the cursor ray.
    const dist = camera.position.distanceTo(controls.target);
    return _raycaster.ray.at(dist, new THREE.Vector3());
  }
  function _onWheel(ev) {
    ev.preventDefault();
    // Scroll DOWN (positive deltaY) = zoom OUT (move away from anchor).
    // OrbitControls uses 0.95 per notch; tune via a small step factor.
    const step = Math.exp((ev.deltaY > 0 ? 1 : -1) * 0.12);
    const anchor = _anchorFromMouse(ev);
    // New camera position = anchor + (camera.position - anchor) * step
    const camOffset = new THREE.Vector3().subVectors(camera.position, anchor)
                                          .multiplyScalar(step);
    const tgtOffset = new THREE.Vector3().subVectors(controls.target, anchor)
                                          .multiplyScalar(step);
    camera.position.copy(anchor).add(camOffset);
    controls.target.copy(anchor).add(tgtOffset);
    controls.update();
  }
  renderer.domElement.addEventListener('wheel', _onWheel, { passive: false });

  // ---------- Keyboard shortcuts (only fire when no input focused) ----------
  function _onKey(ev) {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (ev.metaKey || ev.ctrlKey) return;            // dashboard owns ⌘1-5
    let handled = true;
    switch (ev.key.toLowerCase()) {
      case 'f': frameAll(); break;
      case 'p': framePole(); break;
      case 'r': frameAll(); break;
      case '7': setView('top'); break;
      case '1': setView('front'); break;
      case '3': setView('right'); break;
      case '5': setView('iso'); break;
      default:  handled = false;
    }
    if (handled) ev.preventDefault();
  }
  window.addEventListener('keydown', _onKey);

  // ---------- Animation loop ----------
  let stopped = false;
  function tick() {
    if (stopped) return;
    controls.update();

    // N6: place + fade the orbit-target indicator. Size it ~1% of
    // camera-to-target distance so it stays a steady pixel size in
    // perspective; opacity decays from 0.9 → 0 over 1.2 s of no
    // input (kept hidden when layer toggle is off).
    if (layers.orbitTarget !== false) {
      const camDist = camera.position.distanceTo(controls.target);
      targetMarker.position.copy(controls.target);
      targetMarker.scale.setScalar(Math.max(camDist * 0.012, 0.005));
      const sinceInput = performance.now() - _markerLastInput;
      const fade = sinceInput < 200 ? 1
                 : sinceInput < 1400 ? 1 - (sinceInput - 200) / 1200
                 : 0;
      _markerVisualOpacity = 0.9 * fade;
      targetMarker.material.opacity = _markerVisualOpacity;
      targetMarker.visible = _markerVisualOpacity > 0.005;
    } else {
      targetMarker.visible = false;
    }

    renderer.setViewport(0, 0,
      renderer.domElement.clientWidth, renderer.domElement.clientHeight);
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
    // Render the gizmo last in a small viewport in the bottom-right.
    const w = renderer.domElement.clientWidth;
    const h = renderer.domElement.clientHeight;
    if (w > gizmoSize + gizmoMargin * 2 && h > gizmoSize + gizmoMargin * 2) {
      _gizmoDir.subVectors(camera.position, controls.target).normalize();
      gizmoCam.position.copy(_gizmoDir).multiplyScalar(3);
      gizmoCam.up.copy(camera.up);
      gizmoCam.lookAt(0, 0, 0);
      const x = w - gizmoSize - gizmoMargin;
      const y = gizmoMargin;
      renderer.setScissorTest(true);
      renderer.setScissor(x, y, gizmoSize, gizmoSize);
      renderer.setViewport(x, y, gizmoSize, gizmoSize);
      renderer.render(gizmoScene, gizmoCam);
      renderer.setScissorTest(false);
    }
    requestAnimationFrame(tick);
  }
  tick();

  // Resize tracking.
  const onResize = () => {
    const w = mount.clientWidth, h = mount.clientHeight;
    if (w === 0 || h === 0) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    labelRenderer.setSize(w, h);
  };
  const ro = new ResizeObserver(onResize);
  ro.observe(mount);

  return {
    applyLayers(next) {
      const wasAligned = layers.alignGround;
      layers = { ...next };
      applyVisibility();
      if (storedAlignment) {
        if (layers.alignGround && !wasAligned) {
          applyAlignment(storedAlignment.quaternion, storedAlignment.translateY);
          alignmentApplied = true;
        } else if (!layers.alignGround && wasAligned) {
          applyAlignment(null, 0);
          alignmentApplied = false;
        }
      }
    },
    setPointSize(s) {
      if (pointsMaterial) {
        pointsMaterial.size = s;
        pointsMaterial.needsUpdate = true;
      }
    },
    frameAll() { frameAll(); },
    framePole() { framePole(); },
    setView(name) { setView(name); },
    dispose() {
      stopped = true;
      ro.disconnect();
      window.removeEventListener('keydown', _onKey);
      renderer.domElement.removeEventListener('dblclick', _onDblClick);
      renderer.domElement.removeEventListener('wheel', _onWheel);
      renderer.domElement.removeEventListener('pointerdown', _bumpMarker);
      controls.removeEventListener('change', _bumpMarker);
      disposables.forEach(d => { try { d.dispose(); } catch {} });
      // Drop label DOM nodes.
      labelRenderer.domElement.remove();
      renderer.domElement.remove();
      try { renderer.dispose(); } catch {}
      try { renderer.forceContextLoss(); } catch {}
    },
  };
}

function Spark({ values, color = 'var(--accent)' }) {
  const max = Math.max(...values), min = Math.min(...values);
  const span = max - min || 1;
  const pts = values.map((v, i) => `${(i/(values.length-1))*100},${100 - ((v-min)/span)*100}`).join(' ');
  return (
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{width: '100%', height: '100%'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" opacity="0.85"/>
      <polyline points={`0,100 ${pts} 100,100`} fill={color} opacity="0.08"/>
    </svg>
  );
}

function prettyKind(k) {
  return ({
    height_m: 'Height',
    lean_deg: 'Lean (vs ground normal)',
    lean_cam_up_deg: 'Lean (vs camera-up)',
    metric_scale: 'Metric scale',
  }[k]) || k;
}
function unitDigits(k) {
  return ({
    height_m: 2,
    lean_deg: 1,
    lean_cam_up_deg: 1,
    metric_scale: 4,
  }[k]) ?? 3;
}

        if (!r.ok) throw new Error(`${r.status}`);
        const data = await r.json();
        if (!cancelled) { setRuns(data.runs); setError(null); }
      } catch (e) {
        if (!cancelled) setError(e.message);
      }
    }
    load();
    const id = setInterval(load, 4000);
    return () => { cancelled = true; clearInterval(id); };
  }, [capture.dbId]);

  if (error) {
    return <div className="card card-pad" style={{padding:24, color:'var(--err)'}}>Failed: <code>{error}</code></div>;
  }
  if (runs === null) {
    return <div className="card card-pad" style={{padding:24, color:'var(--text-3)'}}>Loading…</div>;
  }
  // Map backend run rows to the design's row schema. Status mapping
  // mirrors STAGE_STATUS_MAP in App.
  const statusMap = { queued: 'run', running: 'run', succeeded: 'ok', failed: 'err' };
  const rows = runs.map(r => {
    const start = r.started_at ? Date.parse(r.started_at + 'Z') : null;
    const end = r.finished_at ? Date.parse(r.finished_at + 'Z') : null;
    return {
      ts: end || start,
      stage: (STAGES.find(s => s.id === r.stage)?.name) || r.stage,
      status: statusMap[r.status] || 'run',
      ms: (start && end) ? (end - start) : null,
      exit: r.exit_code ?? (r.status === 'succeeded' ? 0 : r.status === 'failed' ? 1 : '—'),
      runId: r.id,
    };
  });

  return (
    <>
      <div className="section-head">
        <h3>Run history</h3>
        <span className="right">{rows.length} run{rows.length === 1 ? '' : 's'}{rows.length ? '' : ' yet'}</span>

        <thead>
          <tr>
            <th style={{width: 160}}>Timestamp</th>
            <th style={{width: 110}}>Stage</th>
            <th style={{width: 90}}>Status</th>
            <th style={{width: 100}}>Duration</th>
            <th style={{width: 80}}>Exit</th>
            <th style={{width: 80}}>Run</th>
            <th>Log</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i}>
              <td>{fmtTime(r.ts)}</td>
              <td><span className="hist-stage">{r.stage.toLowerCase()}</span></td>
              <td>
                <span className={`stage-status ${r.status === 'ok' ? 'ok' : r.status === 'err' ? 'err' : 'run'}`}>
                  <span className="pip"/>{r.status === 'ok' ? 'succeeded' : r.status === 'err' ? 'failed' : 'running'}
                </span>
              </td>
              <td>{stageMs(r.ms)}</td>
              <td style={{color: r.exit === 0 ? 'var(--text-2)' : 'var(--err)'}}>{r.exit}</td>
              <td>#{r.runId}</td>
              <td><button className="btn ghost" style={{height: 22, fontSize: 11, padding: '0 6px'}}>view ↗</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </>
  );
}

function NewCaptureModal({ onClose, onCreate }) {
  const [over, setOver] = useState(false);
  const [name, setName] = useState('pole_006');
  const [notes, setNotes] = useState('');
  const [zipFile, setZipFile] = useState(null);  // a single File (.zip)
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const fileInputRef = useRef(null);

  const acceptFiles = (fileList) => {
    if (!fileList || !fileList.length) return;
    // Only accept the first .zip in the drop. (Folder uploads aren't
    // supported yet; see the hint below the drop-zone.)
    const zips = Array.from(fileList).filter(f =>
      f.name.toLowerCase().endsWith('.zip')
    );
    const f = zips[0] || fileList[0];
    if (!f.name.toLowerCase().endsWith('.zip')) {
      setError('Please drop a single .zip file (folder upload coming soon).');
      return;
    }
    setZipFile(f);
    setError(null);
    const guess = f.name.replace(/\.zip$/i, '').replace(/[^A-Za-z0-9_-]/g, '_');
    if (guess) setName(guess);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setOver(false);
    acceptFiles(e.dataTransfer.files);
  };

  const upload = async () => {
    if (!zipFile) { setError('Drop a .zip first.'); return; }
    setBusy(true); setError(null);
    try {
      const fd = new FormData();
      fd.append('name', name);
      fd.append('file', zipFile);
      const r = await fetch('/api/captures/upload', { method: 'POST', body: fd });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `${r.status}`);
      onCreate(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>New capture</h2>
          <button className="btn ghost icon-only" onClick={onClose}><Icon.x/></button>
        </div>
        <div className="modal-body">
          <div className={`drop-zone ${over ? 'over' : ''}`}
               onDragOver={e => { e.preventDefault(); setOver(true); }}
               onDragLeave={() => setOver(false)}
               onDrop={onDrop}
               onClick={() => fileInputRef.current?.click()}
               style={{cursor:'pointer'}}>
            <Icon.upload className="ico"/>
            <strong>{zipFile ? `${zipFile.name} (${(zipFile.size/1e6).toFixed(1)} MB)` : 'Drop a .zip of photos'}</strong>
            <span className="sub">.jpg .heic .png inside the zip · stays on this machine</span>
            <span className="or">— or —</span>
            <button className="btn" onClick={e => { e.stopPropagation(); fileInputRef.current?.click(); }}>Choose .zip…</button>
            <input ref={fileInputRef} type="file" accept=".zip"
                   style={{display:'none'}}
                   onChange={e => acceptFiles(e.target.files)}/>
          </div>
          <div className="form-row">
            <label>Capture name</label>
            <input value={name} onChange={e => setName(e.target.value)}/>
            <div className="hint">letters / numbers / _ / - only · auto-prefixed with <span className="mono">pole_</span></div>
          </div>
          <div className="form-row">
            <label>Notes <span style={{color:'var(--text-4)'}}>(optional)</span></label>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Site, conditions, anything you want to remember…"/>
          </div>
          {error && (
            <div style={{marginTop: 12, padding: 8, background: 'var(--err-soft)',
                          border: '1px solid var(--err)', borderRadius: 4,
                          color: 'var(--err)', fontSize: 12, fontFamily: 'var(--mono)'}}>
              {error}
            </div>
          )}
        </div>
        <div className="modal-foot">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={upload} disabled={busy || !zipFile}>
            <Icon.play/> {busy ? 'Uploading…' : 'Upload & start EXIF'}
          </button>
        </div>
      </div>
    </div>
  );
}

function TestsModal({ onClose }) {
  const [running, setRunning] = useState(false);
  const [results, setResults] = useState(null);

  const run = async () => {
    setRunning(true);
    setResults(null);
    try {
      const r = await fetch('/api/test', { method: 'POST' });
      const data = await r.json();
      setResults(data);
    } catch (e) {
      setResults({ passed: 0, failed: 0, errors: 1,
                   duration_s: 0, exit_code: -1,
                   output: `request failed: ${e.message}` });
    } finally {
      setRunning(false);
    }
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{width: 680}} onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>Run pytest</h2>
          <button className="btn ghost icon-only" onClick={onClose}><Icon.x/></button>
        </div>
        <div className="modal-body">
          {!running && !results && (
            <div style={{textAlign:'center', padding: '24px 0'}}>
              <div style={{color:'var(--text-3)', marginBottom: 12, fontSize: 12}}>
                Runs the full pytest suite against the local working tree.
              </div>
              <button className="btn primary" onClick={run}><Icon.play/> Run pytest</button>
            </div>
          )}
          {running && (
            <div style={{padding: '24px 0', textAlign:'center', color:'var(--text-3)', fontFamily:'var(--mono)', fontSize: 12}}>
              <div style={{display:'inline-flex', alignItems:'center', gap: 8, color: 'var(--warn)'}}>
                <span className="stage-dot run" style={{width:10, height:10}}/>
                running tests…
              </div>
            </div>
          )}
          {results && (
            <>
              <div style={{display:'flex', gap: 16, marginBottom: 14, alignItems:'baseline'}}>
                <span style={{fontFamily:'var(--mono)', fontSize:18, fontWeight:500}}>
                  <span style={{color:'var(--ok)'}}>{results.passed} passed</span>
                  <span style={{color:'var(--text-4)', margin: '0 8px'}}>·</span>
                  <span style={{color: results.failed ? 'var(--err)' : 'var(--text-3)'}}>{results.failed} failed</span>
                  {results.errors > 0 && <>
                    <span style={{color:'var(--text-4)', margin: '0 8px'}}>·</span>
                    <span style={{color:'var(--err)'}}>{results.errors} errors</span>
                  </>}
                </span>
                <span style={{color:'var(--text-4)', fontFamily:'var(--mono)', fontSize: 11}}>
                  {(results.passed + results.failed + results.errors + (results.skipped || 0))} tests · {results.duration_s?.toFixed?.(2) ?? results.duration_s}s
                </span>
              </div>
              <pre style={{maxHeight: 320, overflowY:'auto', background:'var(--bg-0)',
                           border:'1px solid var(--line)', padding: 10, borderRadius: 4,
                           fontFamily:'var(--mono)', fontSize: 11.5, color:'var(--text-2)',
                           lineHeight: 1.5, margin: 0, whiteSpace:'pre-wrap'}}>
                {results.output || '(no output)'}
              </pre>
            </>
          )}
        </div>
        <div className="modal-foot">
          {results && <button className="btn" onClick={run}><Icon.refresh/> Re-run</button>}
          <button className="btn ghost" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------- App ----------------------------- */
// Map a backend capture (api/captures/{id} response) to the shape
// the rest of the dashboard expects. The design components were
// built against the mock schema; rather than rewrite them, we
// translate at the edge.
const STAGE_STATUS_MAP = {
  queued: 'queued', running: 'run', succeeded: 'ok', failed: 'err',
};

function normalizeCapture(api) {
  // api is the response from /api/captures/{id} (with stages dict).
  const stages = {};
  for (const s of ['exif', 'pose', 'sam', 'scale', 'fit']) {
    const info = api.stages?.[s] || { status: 'queued' };
    stages[s] = {
      s: STAGE_STATUS_MAP[info.status] || 'queued',
      t: info.finished_at ? Date.parse(info.finished_at + 'Z') : null,
      ms: (info.started_at && info.finished_at)
        ? (Date.parse(info.finished_at + 'Z') - Date.parse(info.started_at + 'Z'))
        : null,
      exit: info.exit_code,
      logPath: info.log_path,
      artifact: info.artifact_path,
    };
  }
  // ISO 'YYYY-MM-DD HH:MM:SS' from SQLite is UTC; append Z.
  const createdMs = api.created_at
    ? Date.parse(api.created_at.replace(' ', 'T') + 'Z')
    : Date.now();
  return {
    id: api.name,
    dbId: api.id,
    created: createdMs,
    photoCount: api.n_photos || 0,
    sizeMb: (api.n_photos || 0) * 1.8,        // rough: ~1.8 MB / iPhone JPEG
    notes: api.notes || '',
    stages,
    // Measurements are populated by the fit stage (D5/D7 hookup);
    // null = "Run fit to populate" empty state in the UI.
    measurements: null,
  };
}

async function fetchCaptures() {
  const r = await fetch('/api/captures');
  if (!r.ok) throw new Error(`/api/captures returned ${r.status}`);
  const list = await r.json();
  // Each list entry has summary fields; fetch details (incl. stages
  // map) for each in parallel.
  const detailed = await Promise.all(list.captures.map(async c => {
    const dr = await fetch(`/api/captures/${c.id}`);
    if (!dr.ok) throw new Error(`/api/captures/${c.id} returned ${dr.status}`);
    return normalizeCapture(await dr.json());
  }));
  return detailed;
}

function App() {
  const [captures, setCaptures] = useState([]);
  const [loadError, setLoadError] = useState(null);
  const [activeId, setActiveId] = useState(null);
  const [tab, setTab] = useState('pipeline');
  const [showNew, setShowNew] = useState(false);
  const [showTests, setShowTests] = useState(false);
  const active = captures.find(c => c.id === activeId);

  // Per-(capture × stage) params, e.g. fit's object_id. Persists in
  // localStorage so refreshing the page doesn't lose your tweak.
  const [stageParamsByCapture, setStageParamsByCapture] = useState(() => {
    try { return JSON.parse(localStorage.getItem('polevision.stageParams') || '{}'); }
    catch { return {}; }
  });
  const stageParams = activeId ? (stageParamsByCapture[activeId] || {}) : {};
  const setStageParam = (stageId, params) => {
    setStageParamsByCapture(s => {
      const next = { ...s, [activeId]: { ...(s[activeId] || {}), [stageId]: params } };
      try { localStorage.setItem('polevision.stageParams', JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // Initial data load + periodic refresh so stage transitions show up.
  useEffect(() => {
    let cancelled = false;
    async function load() {
      try {
        const cs = await fetchCaptures();
        if (cancelled) return;
        setCaptures(cs);
        setLoadError(null);
        if (cs.length && !activeId) setActiveId(cs[0].id);
      } catch (e) {
        if (!cancelled) setLoadError(e.message);
      }
    }
    load();
    const intervalId = setInterval(load, 5000);
    return () => { cancelled = true; clearInterval(intervalId); };
  }, []);

  // Live logs from /api/runs/{run_id}/stream. Each capture's logs
  // accumulate across runs; switching captures clears the panel.
  const [logs, setLogs] = useState([]);
  const [activeRunId, setActiveRunId] = useState(null);

  // Reset logs when the active capture changes.
  useEffect(() => { setLogs([]); setActiveRunId(null); }, [activeId]);

  // Subscribe to SSE for the currently active run.
  useEffect(() => {
    if (!activeRunId) return;
    const url = `/api/runs/${activeRunId}/stream`;
    const es = new EventSource(url);
    es.onmessage = (ev) => {
      const t = new Date();
      const ts = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}.${String(t.getMilliseconds()).padStart(3,'0')}`;
      const msg = ev.data;
      if (msg === '[done]') { es.close(); return; }
      // Heuristic level classification for the existing LogPanel.
      const lvl = /error|fail|traceback/i.test(msg) ? 'err'
                : /warn/i.test(msg) ? 'warn'
                : /^\$\s/.test(msg) ? 'dim'
                : 'info';
      setLogs(ls => [...ls, { ts, lvl, msg }]);
    };
    es.onerror = () => { es.close(); };
    return () => es.close();
  }, [activeRunId]);

  // Run a single stage. POST /api/captures/{dbId}/run/{stage}, then
  // attach the SSE stream and refresh capture state when done.
  const runStage = useCallback(async (stage) => {
    if (!active) return;
    const params = (stageParamsByCapture[active.id] || {})[stage];
    setLogs(ls => [...ls, {
      ts: new Date().toLocaleTimeString('en-GB'),
      lvl: 'dim',
      msg: `$ POST /api/captures/${active.dbId}/run/${stage}` +
           (params ? ` ${JSON.stringify(params)}` : ''),
    }]);
    try {
      const r = await fetch(`/api/captures/${active.dbId}/run/${stage}`, {
        method: 'POST',
        headers: params ? { 'Content-Type': 'application/json' } : {},
        body: params ? JSON.stringify({ params }) : undefined,
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `${r.status}`);
      setActiveRunId(data.run_id);
    } catch (e) {
      setLogs(ls => [...ls, {
        ts: new Date().toLocaleTimeString('en-GB'),
        lvl: 'err',
        msg: `failed to start ${stage}: ${e.message}`,
      }]);
    }
  }, [active, stageParamsByCapture]);

  // Cancel the active run for the active capture's given stage.
  const cancelStage = useCallback(async (stage) => {
    if (!active) return;
    // Find the most recent running run for this capture+stage.
    try {
      const r = await fetch(`/api/captures/${active.dbId}/runs`);
      const data = await r.json();
      const target = data.runs.find(rr => rr.stage === stage && rr.status === 'running');
      if (!target) return;
      await fetch(`/api/runs/${target.id}/cancel`, { method: 'POST' });
      setLogs(ls => [...ls, {
        ts: new Date().toLocaleTimeString('en-GB'),
        lvl: 'warn',
        msg: `cancelled run #${target.id} (${stage})`,
      }]);
    } catch (e) {
      setLogs(ls => [...ls, {
        ts: new Date().toLocaleTimeString('en-GB'),
        lvl: 'err',
        msg: `failed to cancel ${stage}: ${e.message}`,
      }]);
    }
  }, [active]);

  // Run-all: chain stages sequentially, skipping already-succeeded ones.
  const runAll = useCallback(async () => {
    if (!active) return;
    for (const s of ['exif','pose','sam','scale','fit']) {
      const status = active.stages[s]?.s;
      if (status === 'ok') continue;
      // Trigger the run; wait for the run to leave 'running' state.
      const r = await fetch(`/api/captures/${active.dbId}/run/${s}`, {
        method: 'POST',
      });
      const data = await r.json();
      if (!r.ok) {
        setLogs(ls => [...ls, {
          ts: new Date().toLocaleTimeString('en-GB'),
          lvl: 'err', msg: `failed to start ${s}: ${data.detail}`,
        }]); break;
      }
      setActiveRunId(data.run_id);
      // Poll until done.
      while (true) {
        await new Promise(res => setTimeout(res, 800));
        const rr = await fetch(`/api/runs/${data.run_id}`);
        const rj = await rr.json();
        if (rj.status === 'succeeded') break;
        if (rj.status === 'failed') return;   // stop chain on failure
      }
    }
  }, [active]);

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.metaKey || e.ctrlKey) {
        const tabs = ['pipeline','masks','3d','measurements','history'];
        const n = parseInt(e.key);
        if (n >= 1 && n <= 5) { e.preventDefault(); setTab(tabs[n-1]); }
      } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        const i = captures.findIndex(c => c.id === activeId);
        if (i >= 0) {
          const next = e.key === 'ArrowDown' ? Math.min(captures.length-1, i+1) : Math.max(0, i-1);
          setActiveId(captures[next].id);
          e.preventDefault();
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [captures, activeId]);

  const overall = useMemo(() => {
    if (!active) return { label: '—', cls: 'queued' };
    const s = active.stages;
    if (Object.values(s).some(x => x.s === 'err')) return { label: 'failed', cls: 'err' };
    if (Object.values(s).some(x => x.s === 'run')) return { label: 'running', cls: 'run' };
    if (Object.values(s).every(x => x.s === 'ok')) return { label: 'complete', cls: 'ok' };
    return { label: 'partial', cls: 'queued' };
  }, [active]);

  const tabs = [
    { id: 'pipeline', label: 'Pipeline', kbd: '⌘1' },
    { id: 'masks', label: 'Masks', kbd: '⌘2' },
    { id: '3d', label: '3D', kbd: '⌘3' },
    { id: 'measurements', label: 'Measurements', kbd: '⌘4' },
    { id: 'history', label: 'History', kbd: '⌘5' },
  ];

  return (
    <div className="app">
      <TopBar active={active} onNew={() => setShowNew(true)} onTests={() => setShowTests(true)}/>
      <div className="main">
        <Sidebar captures={captures} activeId={activeId} setActiveId={setActiveId} onNew={() => setShowNew(true)}/>
        <main className="detail">
          {!active && (
            <div style={{padding:'48px 32px', color:'var(--text-3)', maxWidth:560}}>
              {loadError ? (
                <>
                  <h2 style={{color:'var(--err)', marginTop:0}}>API error</h2>
                  <p className="mono" style={{fontSize:12}}>{loadError}</p>
                  <p>Is the dashboard server running? Check the terminal
                  output of <code>python -m uvicorn app.main:app</code>.</p>
                </>
              ) : captures.length === 0 ? (
                <>
                  <h2 style={{marginTop:0}}>No captures yet</h2>
                  <p>Drop a folder of photos under the working directory
                  named <code>pole_xxx/</code>, or click <b>+ New capture</b>
                  in the top bar to upload one.</p>
                </>
              ) : (
                <p>Select a capture from the sidebar.</p>
              )}
            </div>
          )}
          {active && <>
          <div className="detail-head">
            <div className="detail-title">
              <h1>{active.id}</h1>
              <span className="id">id {active.id.replace('pole_','')}</span>
              <span className={`stage-status ${overall.cls}`}><span className="pip"/>{overall.label}</span>
            </div>
            <div className="detail-meta">
              <span><span className="k">created</span><span className="v">{relTime(active.created)}</span></span>
              <span><span className="k">photos</span><span className="v">{active.photoCount}</span></span>
              <span><span className="k">size</span><span className="v">{(active.sizeMb/1024).toFixed(2)} GB</span></span>
              <span><span className="k">notes</span><span className="v" style={{color:'var(--text-3)'}}>{active.notes || '—'}</span></span>
            </div>
            <div className="tabs">
              {tabs.map(t =>
                <button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={() => setTab(t.id)}>
                  {t.label}
                  <span className="kbd">{t.kbd}</span>
                </button>
              )}
            </div>
          </div>
          <div className="detail-body">
            {tab === 'pipeline' && <PipelineTab
              capture={active}
              logs={logs}
              onRunStage={runStage}
              onRunAll={runAll}
              onCancelStage={cancelStage}
              stageParams={stageParams}
              setStageParams={setStageParam}/>}
            {tab === 'masks' && <MasksTab capture={active}/>}
            {tab === '3d' && <ThreeDTab capture={active}/>}
            {tab === 'measurements' && <MeasurementsTab capture={active}/>}
            {tab === 'history' && <HistoryTab capture={active}/>}
          </div>
          </>}
        </main>
      </div>
      {showNew && <NewCaptureModal
        onClose={() => setShowNew(false)}
        onCreate={async (created) => {
          setShowNew(false);
          // Refetch captures, switch to the new one, kick off EXIF.
          const cs = await fetchCaptures();
          setCaptures(cs);
          const fresh = cs.find(c => c.id === created.name);
          if (fresh) {
            setActiveId(fresh.id);
            try {
              const r = await fetch(
                `/api/captures/${fresh.dbId}/run/exif`, {method:'POST'},
              );
              const data = await r.json();
              if (r.ok) setActiveRunId(data.run_id);
            } catch (e) { /* surfaced in next refresh */ }
          }
        }}/>}
      {showTests && <TestsModal onClose={() => setShowTests(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
