<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PoleVision — Dashboard</title>
<meta name="viewport" content="width=1280" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- three.js + add-ons. Pinned to 0.146 — last release with the
     `examples/js/` (UMD) build of OrbitControls + PLYLoader +
     CSS2DRenderer. 0.147+ moved everything to ES modules
     (`examples/jsm/`) and removed the global-scoped UMD shims, so
     the script-tag approach stops working past that. -->
<script src="https://unpkg.com/three@0.146.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.146.0/examples/js/loaders/PLYLoader.js"></script>
<script src="https://unpkg.com/three@0.146.0/examples/js/renderers/CSS2DRenderer.js"></script>
<style>
  :root {
    --bg-0: #0e0e10;
    --bg-1: #141417;
    --bg-2: #1a1a1d;
    --bg-3: #1f1f23;
    --bg-4: #26262b;
    --line: #2a2a30;
    --line-2: #34343b;
    --text: #e6e6ea;
    --text-2: #b6b6bd;
    --text-3: #8a8a92;
    --text-4: #5f5f67;
    --accent: #7a7ad6;        /* brighter cousin of #557 for dark UI */
    --accent-2: #557;
    --accent-soft: rgba(122, 122, 214, 0.12);
    --accent-line: rgba(122, 122, 214, 0.35);
    --pole: #e8c547;          /* pole-axis yellow */
    --ok: #5fb878;
    --ok-soft: rgba(95, 184, 120, 0.12);
    --warn: #d9a441;
    --warn-soft: rgba(217, 164, 65, 0.12);
    --err: #d36464;
    --err-soft: rgba(211, 100, 100, 0.12);
    --info: #6aa9d6;
    --shadow-1: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.4);
    --shadow-2: 0 8px 30px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03) inset;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.4; -webkit-font-smoothing: antialiased; }
  body { min-width: 1280px; overflow-x: auto; }

  button { font-family: inherit; font-size: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent-soft); color: var(--text); }

  .mono { font-family: var(--mono); font-feature-settings: "tnum" 1, "ss01" 1; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* Layout */
  .app { min-height: 100vh; display: grid; grid-template-rows: 48px 1fr; }

  /* Top bar */
  .topbar {
    display: grid;
    grid-template-columns: 240px 1fr auto;
    align-items: center;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1);
    height: 48px;
    position: sticky; top: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 10px; padding: 0 16px; height: 48px; border-right: 1px solid var(--line); }
  .brand-mark {
    width: 22px; height: 22px; position: relative; flex: 0 0 auto;
  }
  .brand-mark svg { display: block; }
  .brand-name { font-weight: 600; letter-spacing: -0.01em; font-size: 13.5px; }
  .brand-name .dot { color: var(--pole); }
  .brand-version { font-family: var(--mono); font-size: 10.5px; color: var(--text-4); margin-left: 6px; padding: 1px 5px; border: 1px solid var(--line-2); border-radius: 3px; }

  .topbar-center { padding: 0 16px; color: var(--text-4); font-family: var(--mono); font-size: 11.5px; display: flex; align-items: center; gap: 16px; }
  .crumbs { display: flex; align-items: center; gap: 8px; }
  .crumbs .sep { color: var(--text-4); }
  .crumbs .now { color: var(--text-2); }

  .topbar-right { display: flex; align-items: center; gap: 8px; padding: 0 12px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 10px;
    border-radius: 5px;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    color: var(--text-2);
    font-size: 12.5px; font-weight: 500;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-3); color: var(--text); border-color: #3d3d45; }
  .btn:active { background: var(--bg-2); }
  .btn.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
    box-shadow: 0 0 0 1px rgba(122,122,214,0.2), 0 1px 0 rgba(255,255,255,0.12) inset;
  }
  .btn.primary:hover { background: #8a8ae0; border-color: #8a8ae0; }
  .btn.ghost { background: transparent; border-color: transparent; }
  .btn.ghost:hover { background: var(--bg-2); border-color: var(--line-2); }
  .btn.danger { color: var(--err); border-color: rgba(211,100,100,0.3); }
  .btn.danger:hover { background: var(--err-soft); }
  .btn .kbd { font-family: var(--mono); font-size: 10.5px; color: var(--text-4); padding: 1px 4px; border: 1px solid var(--line-2); border-radius: 3px; }
  .btn.icon-only { width: 28px; padding: 0; justify-content: center; }

  .icon { width: 14px; height: 14px; flex: 0 0 auto; }

  /* Main grid */
  .main { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 48px); }

  /* Sidebar */
  .sidebar { border-right: 1px solid var(--line); background: var(--bg-1); display: flex; flex-direction: column; height: calc(100vh - 48px); position: sticky; top: 48px; }
  .side-head { padding: 14px 14px 8px; }
  .side-title { display: flex; align-items: baseline; gap: 8px; }
  .side-title h2 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin: 0; }
  .side-title .count { font-family: var(--mono); font-size: 11px; color: var(--text-4); }
  .side-controls { display: flex; gap: 6px; margin-top: 10px; }
  .seg {
    display: inline-flex; padding: 2px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 5px;
  }
  .seg button {
    height: 22px; padding: 0 8px; font-size: 11px; color: var(--text-3); border-radius: 3px;
  }
  .seg button.on { background: var(--bg-4); color: var(--text); }
  .side-search {
    margin-top: 8px; height: 28px; display: flex; align-items: center; gap: 6px;
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 5px; padding: 0 8px;
  }
  .side-search input { background: transparent; border: 0; outline: 0; flex: 1; color: var(--text); font-size: 12px; }
  .side-search input::placeholder { color: var(--text-4); }
  .side-search .kbd { font-family: var(--mono); font-size: 10px; color: var(--text-4); padding: 1px 4px; border: 1px solid var(--line-2); border-radius: 3px; }

  .side-list { flex: 1; overflow-y: auto; padding: 6px 8px 16px; }
  .side-list::-webkit-scrollbar { width: 8px; }
  .side-list::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }

  .cap-card {
    position: relative; padding: 10px 10px 10px 12px; border-radius: 6px;
    cursor: pointer; border: 1px solid transparent;
    margin-bottom: 2px;
  }
  .cap-card:hover { background: var(--bg-2); }
  .cap-card.active { background: var(--bg-2); border-color: var(--line); }
  .cap-card.active::before {
    content: ''; position: absolute; left: -8px; top: 8px; bottom: 8px; width: 2px; background: var(--accent); border-radius: 2px;
  }
  .cap-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .cap-name { font-family: var(--mono); font-size: 12.5px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
  .cap-time { font-size: 10.5px; color: var(--text-4); white-space: nowrap; }
  .cap-stages { display: flex; gap: 4px; margin-top: 8px; align-items: center; }
  .stage-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg-4); border: 1px solid var(--line-2);
    position: relative;
  }
  .stage-dot.ok { background: var(--ok); border-color: var(--ok); }
  .stage-dot.run {
    background: var(--warn); border-color: var(--warn);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .stage-dot.err { background: var(--err); border-color: var(--err); }
  .stage-dot.queued { background: var(--bg-3); border-color: var(--line-2); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,164,65,0.5); }
    50% { box-shadow: 0 0 0 4px rgba(217,164,65,0); }
  }
  .cap-summary { margin-top: 8px; font-family: var(--mono); font-size: 11px; color: var(--text-3); display: flex; gap: 8px; align-items: center; }
  .cap-summary .sep { color: var(--text-4); }
  .cap-summary.empty { color: var(--text-4); font-style: normal; }

  .side-empty {
    margin: 24px 12px; padding: 20px 14px; border: 1px dashed var(--line-2); border-radius: 8px;
    color: var(--text-3); font-size: 12px; text-align: center;
  }
  .side-empty strong { color: var(--text); display: block; margin-bottom: 4px; font-weight: 600; }

  .side-foot {
    border-top: 1px solid var(--line); padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 10.5px; color: var(--text-4);
  }
  .side-foot .ok { color: var(--ok); }

  /* Capture detail */
  .detail { display: flex; flex-direction: column; min-width: 0; }

  .detail-head {
    border-bottom: 1px solid var(--line);
    padding: 16px 28px 0;
    background: var(--bg-0);
  }
  .detail-title { display: flex; align-items: baseline; gap: 12px; }
  .detail-title h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; font-family: var(--mono); }
  .detail-title .id { font-family: var(--mono); font-size: 11px; color: var(--text-4); padding: 2px 6px; border: 1px solid var(--line-2); border-radius: 4px; }
  .detail-title .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--ok-soft); color: var(--ok); border: 1px solid rgba(95,184,120,0.25); font-weight: 500; }

  .detail-meta { margin-top: 8px; display: flex; gap: 20px; color: var(--text-3); font-size: 12px; flex-wrap: wrap; }
  .detail-meta .k { color: var(--text-4); margin-right: 6px; }
  .detail-meta .v { font-family: var(--mono); color: var(--text-2); }

  .tabs { display: flex; gap: 2px; margin-top: 18px; border-bottom: 0; position: relative; }
  .tab {
    padding: 9px 14px; font-size: 12.5px; color: var(--text-3); border-radius: 5px 5px 0 0;
    border: 1px solid transparent; border-bottom: 0;
    display: inline-flex; align-items: center; gap: 8px;
    position: relative;
  }
  .tab .kbd { font-family: var(--mono); font-size: 10px; color: var(--text-4); padding: 0 4px; border: 1px solid var(--line-2); border-radius: 3px; }
  .tab:hover { color: var(--text-2); }
  .tab.on {
    color: var(--text); background: var(--bg-2);
    border-color: var(--line);
  }
  .tab.on::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px; background: var(--bg-2);
  }

  .detail-body { flex: 1; padding: 24px 28px 40px; min-width: 0; }

  /* Pipeline */
  .pipeline-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 16px; }
  .pipeline-head h3 { margin: 0; font-size: 13px; font-weight: 600; color: var(--text-2); letter-spacing: -0.005em; }
  .pipeline-head .sub { color: var(--text-4); font-size: 11.5px; font-family: var(--mono); }

  .flow {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
    border: 1px solid var(--line); border-radius: 8px; background: var(--bg-1);
    position: relative; overflow: hidden;
  }
  .flow .stage {
    padding: 16px 16px 14px;
    border-right: 1px solid var(--line);
    position: relative;
    min-height: 156px;
    display: flex; flex-direction: column;
  }
  .flow .stage:last-child { border-right: 0; }

  .flow .stage::after {
    /* arrow */
    content: ''; position: absolute; right: -7px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px;
    background: var(--bg-1);
    border-top: 1px solid var(--line); border-right: 1px solid var(--line);
    transform: translateY(-50%) rotate(45deg);
    z-index: 2;
  }
  .flow .stage:last-child::after { display: none; }

  .stage-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .stage-num {
    width: 18px; height: 18px; border-radius: 4px; background: var(--bg-3);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10.5px; color: var(--text-3); font-weight: 500;
  }
  .stage-name { font-family: var(--mono); font-size: 12.5px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; color: var(--text); }
  .stage-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; padding: 2px 7px; border-radius: 999px;
    background: var(--bg-3); border: 1px solid var(--line-2);
    color: var(--text-3);
  }
  .stage-status .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--text-4); }
  .stage-status.ok { color: var(--ok); border-color: rgba(95,184,120,0.3); background: var(--ok-soft); }
  .stage-status.ok .pip { background: var(--ok); }
  .stage-status.run { color: var(--warn); border-color: rgba(217,164,65,0.3); background: var(--warn-soft); }
  .stage-status.run .pip { background: var(--warn); animation: pulse 1.4s ease-in-out infinite; }
  .stage-status.err { color: var(--err); border-color: rgba(211,100,100,0.3); background: var(--err-soft); }
  .stage-status.err .pip { background: var(--err); }
  .stage-status.queued { color: var(--text-3); }

  .stage-body { margin-top: 12px; flex: 1; }
  .stage-row { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0; font-size: 11.5px; color: var(--text-3); }
  .stage-row .k { color: var(--text-4); }
  .stage-row .v { font-family: var(--mono); color: var(--text-2); }
  .stage-bar {
    margin-top: 8px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden;
  }
  .stage-bar > i { display: block; height: 100%; background: var(--warn); border-radius: 2px; }
  .stage-foot { margin-top: 12px; display: flex; gap: 6px; }
  .stage-foot .btn { height: 26px; padding: 0 8px; font-size: 11.5px; }

  .stage.is-active { background: var(--bg-2); }

  .flow-actions {
    margin-top: 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .flow-actions .left { display: flex; gap: 8px; align-items: center; }
  .flow-actions .right { display: flex; gap: 8px; }
  .pill {
    height: 26px; padding: 0 10px; border-radius: 999px;
    background: var(--bg-2); border: 1px solid var(--line); color: var(--text-3);
    font-size: 11.5px; display: inline-flex; align-items: center; gap: 6px;
  }
  .pill .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* Log panel */
  .log-panel {
    margin-top: 18px; border: 1px solid var(--line); border-radius: 8px; background: #0b0b0d; overflow: hidden;
  }
  .log-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--bg-1); border-bottom: 1px solid var(--line);
  }
  .log-head .title { font-family: var(--mono); font-size: 11.5px; color: var(--text-2); display: flex; gap: 10px; align-items: center; }
  .log-head .title .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
  .log-head .actions { display: flex; gap: 6px; }
  .log-head .actions .btn { height: 24px; padding: 0 8px; font-size: 11px; }
  .log-body {
    height: 220px; overflow-y: auto;
    font-family: var(--mono); font-size: 11.5px; line-height: 1.55;
    padding: 10px 14px;
    color: var(--text-2);
  }
  .log-body::-webkit-scrollbar { width: 8px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  .log-line { display: grid; grid-template-columns: 90px 60px 1fr; gap: 10px; padding: 1px 0; }
  .log-line .ts { color: var(--text-4); }
  .log-line .lvl { font-weight: 500; }
  .log-line .lvl.info { color: var(--info); }
  .log-line .lvl.warn { color: var(--warn); }
  .log-line .lvl.err { color: var(--err); }
  .log-line .lvl.ok { color: var(--ok); }
  .log-line .lvl.dim { color: var(--text-4); }
  .log-line .msg { white-space: pre-wrap; word-break: break-word; }

  /* Section headers */
  .section { margin-top: 22px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px;
  }
  .section-head h3 { margin: 0; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); }
  .section-head .right { font-size: 11px; color: var(--text-4); font-family: var(--mono); }

  /* Cards generic */
  .card { background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px; }
  .card-pad { padding: 14px 16px; }

  /* Measurements */
  .meas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .meas {
    background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px;
    padding: 14px 16px; position: relative;
    display: flex; flex-direction: column; min-height: 120px;
  }
  .meas-top { display: flex; align-items: center; justify-content: space-between; }
  .meas-name { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); font-weight: 600; }
  .meas-info { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--line-2); color: var(--text-4); font-size: 9px; display: inline-flex; align-items: center; justify-content: center; cursor: help; }
  .meas-info:hover { color: var(--text-2); border-color: var(--text-3); }
  .meas-val { margin-top: 8px; font-family: var(--mono); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; color: var(--text); }
  .meas-val .unit { font-size: 13px; color: var(--text-3); margin-left: 4px; }
  .meas-bound { margin-top: 4px; font-family: var(--mono); font-size: 11.5px; color: var(--text-3); }
  .meas-bound .pm { color: var(--text-4); }
  .meas-spark { margin-top: 10px; height: 22px; }
  .meas-foot { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; font-size: 11px; color: var(--text-4); font-family: var(--mono); }
  .meas.empty { background: repeating-linear-gradient(45deg, var(--bg-1) 0 8px, #16161a 8px 16px); color: var(--text-4); }
  .meas.empty .meas-val { color: var(--text-4); font-size: 13px; font-family: var(--sans); margin-top: 22px; }

  /* Masks tab */
  .masks-grid { display: grid; grid-template-columns: 1fr 280px; gap: 14px; }
  .viewer {
    background: #0a0a0c; border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; aspect-ratio: 16 / 10; position: relative;
  }
  .viewer-stub {
    position: absolute; inset: 0; display: grid; place-items: center;
  }
  .viewer-canvas {
    position: absolute; inset: 0;
  }
  .frame-strip {
    position: absolute; left: 14px; right: 14px; bottom: 14px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(20,20,23,0.92); backdrop-filter: blur(6px);
    border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px;
  }
  .frame-strip .frame-num { font-family: var(--mono); font-size: 11.5px; color: var(--text-2); white-space: nowrap; }
  .slider {
    flex: 1; height: 6px; background: var(--bg-3); border-radius: 3px; position: relative; cursor: pointer;
  }
  .slider .fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 3px; }
  .slider .knob { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 0 3px var(--accent-soft); }

  /* Toggle */

  .toggle.on { background: var(--accent); }
  .toggle.on .knob { left: 14px; background: #fff; }

  /* Slider in panel */

  .slider-row label { font-size: 11.5px; color: var(--text-3); width: 70px; }
  .slider-row .slider { height: 4px; }
  .slider-row .val { font-family: var(--mono); font-size: 11px; color: var(--text-2); width: 40px; text-align: right; }

  .ref-tap-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
  .ref-tap {
    display: grid; grid-template-columns: 16px 1fr auto; gap: 8px; align-items: center;
    padding: 6px 8px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 5px;
    font-family: var(--mono); font-size: 11px;
  }
  .ref-tap .idx { color: var(--text-4); }
  .ref-tap .coord { color: var(--text-2); }
  .ref-tap .x { color: var(--text-4); cursor: pointer; }
  .ref-tap .x:hover { color: var(--err); }

  /* 3D tab */
  .threed-status {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px 8px 0 0; border-bottom: 0;

  .threed-status .left { display: flex; align-items: center; gap: 12px; }

  .threed-status .url { font-family: var(--mono); font-size: 11.5px; color: var(--text-2); }
  .threed-frame {
    border: 1px solid var(--line); border-radius: 0 0 8px 8px; overflow: hidden;

  /* Measurements expanded */
  .meas-summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;

    padding: 14px 18px; border-right: 1px solid var(--line);

  .meas-summary > div:last-child { border-right: 0; }
  .meas-summary .lab { font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); font-weight: 600; }
  .meas-summary .big { margin-top: 6px; font-family: var(--mono); font-size: 24px; font-weight: 500; letter-spacing: -0.01em; }

  .meas-summary .small { margin-top: 4px; font-family: var(--mono); font-size: 11px; color: var(--text-3); }

  .form-row { margin-top: 14px; }

  .form-row input, .form-row textarea {
    width: 100%; background: var(--bg-2); border: 1px solid var(--line); border-radius: 5px;
    padding: 8px 10px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .form-row textarea { font-family: var(--sans); font-size: 12.5px; min-height: 60px; resize: vertical; }
  .form-row .hint { margin-top: 4px; font-size: 11px; color: var(--text-4); }

  /* Tests modal */
  .test-result {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 4px;
    font-family: var(--mono); font-size: 11.5px; margin-bottom: 4px;
  }
  .test-result .pip { width: 6px; height: 6px; border-radius: 50%; }
  .test-result.pass .pip { background: var(--ok); }
  .test-result.fail .pip { background: var(--err); }
  .test-result .name { flex: 1; color: var(--text-2); }
  .test-result .t { color: var(--text-4); font-size: 10.5px; }

  /* Subtle */
  .hr { height: 1px; background: var(--line); margin: 14px 0; }

  /* Scrollbars baseline */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  *::-webkit-scrollbar-track { background: transparent; }

  /* Pole axis decorative line in top bar */
  .pole-pulse {
    height: 2px; background: linear-gradient(90deg, transparent, var(--pole) 40%, var(--pole) 60%, transparent);
    width: 60px; opacity: 0.5;
  }

  /* Tooltip */
  .tip { position: relative; }
  .tip:hover .tip-body { opacity: 1; visibility: visible; transform: translate(-50%, 0); }
  .tip-body {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translate(-50%, 4px);
    background: var(--bg-4); border: 1px solid var(--line-2); color: var(--text-2);
    font-size: 11px; padding: 6px 8px; border-radius: 4px; white-space: nowrap;
    opacity: 0; visibility: hidden; transition: all 0.12s; pointer-events: none; z-index: 30;
    font-family: var(--mono);
  }

  /* Reference tap dot on canvas */
  .tap-dot {
    position: absolute; width: 14px; height: 14px;
    border: 2px solid var(--pole); background: rgba(232,197,71,0.25);
    border-radius: 50%; transform: translate(-50%, -50%);

  .tap-dot::after {

  .pole-line { stroke: var(--pole); stroke-width: 1.5; stroke-dasharray: 4 4; opacity: 0.85; }

  .grid-bg {

      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Marker icon helpers */
  .ico-svg { width: 14px; height: 14px; flex: 0 0 auto; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ----------------------------- Icons ----------------------------- */
const Icon = {

  chevron: (p) => <svg className="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" {...p}><path d="m6 4 4 4-4 4"/></svg>,

  upload: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" {...p}><path d="M12 16V4M7 9l5-5 5 5M4 18.5h16"/></svg>,
  x: (p) => <svg className="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" {...p}><path d="m4 4 8 8M12 4l-8 8"/></svg>,
  refresh: (p) => <svg className="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" {...p}><path d="M2.5 8a5.5 5.5 0 0 1 9.5-3.8M13.5 8a5.5 5.5 0 0 1-9.5 3.8M12 2v3h-3M4 14v-3h3"/></svg>,
  pause: (p) => <svg className="icon" viewBox="0 0 16 16" fill="currentColor" {...p}><rect x="4" y="3" width="3" height="10"/><rect x="9" y="3" width="3" height="10"/></svg>,
  filter: (p) => <svg className="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" {...p}><path d="M2.5 3.5h11l-4 5v4l-3-1.5v-2.5z"/></svg>,
};

/* ----------------------------- Brand mark ----------------------------- */
function BrandMark() {
  // a stylized utility pole: vertical with crossarm
  return (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="10" y="2" width="2" height="18" rx="0.5" fill="#e8c547"/>
      <rect x="3" y="6" width="16" height="1.6" rx="0.3" fill="#e8c547" opacity="0.85"/>
      <circle cx="4" cy="6.8" r="1" fill="#7a7ad6"/>
      <circle cx="11" cy="6.8" r="1" fill="#7a7ad6"/>
      <circle cx="18" cy="6.8" r="1" fill="#7a7ad6"/>
    </svg>
  );
}

/* ----------------------------- Mock data ----------------------------- */
const STAGES = [
  { id: 'exif', name: 'EXIF', desc: 'Extract photo metadata' },
  { id: 'pose', name: 'Pose', desc: 'Camera & scene reconstruction' },
  { id: 'sam', name: 'SAM', desc: 'Segment objects in frames' },
  { id: 'scale', name: 'Scale', desc: 'Calibrate from reference taps' },
  { id: 'fit', name: 'Fit', desc: 'Solve pole geometry' },
];

const initialCaptures = [
  {
    id: 'pole_001', created: 1714325000000 - 2 * 86400000, photoCount: 142, sizeMb: 1843,
    notes: 'Riverside Dr — wood class 4',
    stages: { exif: { s: 'ok', t: 1714150220000, ms: 4200, exit: 0 },
              pose: { s: 'ok', t: 1714150480000, ms: 65300, exit: 0 },
              sam:  { s: 'ok', t: 1714151200000, ms: 184500, exit: 0 },
              scale:{ s: 'ok', t: 1714159820000, ms: 2300, exit: 0 },
              fit:  { s: 'ok', t: 1714159930000, ms: 12100, exit: 0 } },
    measurements: { height: 8.96, heightSig: 0.5, lean: 15.0, leanSig: 3, dia15: 0.28, dia15Sig: 0.04, dia60: 0.22, dia60Sig: 0.05, attach1: 7.2, attach1Sig: 0.3, attach2: 6.8, attach2Sig: 0.4 }
  },
  {
    id: 'pole_002', created: 1714325000000 - 1 * 86400000, photoCount: 88, sizeMb: 1102,
    notes: 'Maple & 4th',
    stages: { exif: { s: 'ok', t: 1714238000000, ms: 3100 },
              pose: { s: 'ok', t: 1714238400000, ms: 71200 },
              sam:  { s: 'ok', t: 1714239200000, ms: 162000 },
              scale:{ s: 'ok', t: 1714242000000, ms: 2100 },
              fit:  { s: 'ok', t: 1714242100000, ms: 11400 } },
    measurements: { height: 9.42, heightSig: 0.4, lean: 4.2, leanSig: 1.8, dia15: 0.31, dia15Sig: 0.03, dia60: null, attach1: 8.1, attach1Sig: 0.25 }
  },
  {
    id: 'pole_003', created: 1714325000000 - 0.5 * 86400000, photoCount: 96, sizeMb: 1245,
    notes: 'service drop, suspected lean',
    stages: { exif: { s: 'ok', t: 1714281000000, ms: 3500 },
              pose: { s: 'ok', t: 1714281600000, ms: 68000 },
              sam:  { s: 'run', t: Date.now() - 64000, ms: null, progress: 0.62 },
              scale:{ s: 'queued' },
              fit:  { s: 'queued' } },
    measurements: null
  },
  {
    id: 'pole_004', created: 1714325000000 - 0.2 * 86400000, photoCount: 124, sizeMb: 1582,
    notes: 'Elm Ave / behind transformer',
    stages: { exif: { s: 'ok', t: 1714312000000, ms: 4400 },
              pose: { s: 'err', t: 1714312500000, ms: 19400, exit: 137, err: 'COLMAP: insufficient overlap (24 of 124 frames matched)' },
              sam:  { s: 'queued' },
              scale:{ s: 'queued' },
              fit:  { s: 'queued' } },
    measurements: null
  },
  {
    id: 'pole_005', created: 1714325000000 - 0.05 * 86400000, photoCount: 0, sizeMb: 0,
    notes: '',
    stages: { exif: { s: 'queued' }, pose: { s: 'queued' }, sam: { s: 'queued' }, scale: { s: 'queued' }, fit: { s: 'queued' } },
    measurements: null
  },
];

const stageMs = (n) => n == null ? '—' : n < 1000 ? `${n}ms` : n < 60000 ? `${(n/1000).toFixed(1)}s` : `${Math.floor(n/60000)}m ${Math.round((n%60000)/1000)}s`;

function relTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if (d >= 1) return d === 1 ? '1 day ago' : `${d} days ago`;
  if (h >= 1) return h === 1 ? '1 hour ago' : `${h} hours ago`;
  if (m >= 1) return `${m} min ago`;
  return 'just now';
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
}

/* ----------------------------- Capture sidebar ----------------------------- */
function StageDots({ stages }) {
  return (
    <div className="cap-stages">
      {STAGES.map((s, i) => {
        const st = stages[s.id]?.s || 'queued';
        const cls = st === 'ok' ? 'ok' : st === 'run' ? 'run' : st === 'err' ? 'err' : 'queued';
        return <div key={s.id} className={`stage-dot ${cls}`} title={`${s.name}: ${st}`}/>;
      })}
    </div>
  );
}

function CaptureCard({ c, active, onClick }) {
  const m = c.measurements;
  return (
    <div className={`cap-card ${active ? 'active' : ''}`} onClick={onClick}>
      <div className="cap-row">
        <span className="cap-name">{c.id}</span>
        <span className="cap-time">{relTime(c.created)}</span>
      </div>
      <StageDots stages={c.stages}/>
      <div className={`cap-summary ${m ? '' : 'empty'}`}>
        {m ? (
          <>
            <span>{m.height.toFixed(2)} m</span>
            <span className="sep">•</span>
            <span>{m.lean.toFixed(1)}° lean</span>
          </>
        ) : (
          <span>{c.stages.pose?.s === 'err' ? 'pose failed' : 'awaiting fit'}</span>
        )}
      </div>
    </div>
  );
}

function Sidebar({ captures, activeId, setActiveId, onNew }) {
  const [filter, setFilter] = useState('all');
  const [q, setQ] = useState('');

  const list = captures.filter(c => {
    if (q && !c.id.toLowerCase().includes(q.toLowerCase()) && !c.notes.toLowerCase().includes(q.toLowerCase())) return false;
    if (filter === 'running') return Object.values(c.stages).some(x => x.s === 'run');
    if (filter === 'failed')  return Object.values(c.stages).some(x => x.s === 'err');
    if (filter === 'done')    return Object.values(c.stages).every(x => x.s === 'ok');
    return true;
  });

  return (
    <aside className="sidebar">
      <div className="side-head">
        <div className="side-title">
          <h2>Captures</h2>
          <span className="count">{captures.length}</span>
        </div>
        <div className="side-search">
          <Icon.search style={{color: 'var(--text-4)'}}/>
          <input placeholder="Search captures…" value={q} onChange={e => setQ(e.target.value)}/>
          <span className="kbd">/</span>
        </div>
        <div className="side-controls">
          <div className="seg">
            {['all','running','failed','done'].map(f =>
              <button key={f} className={filter === f ? 'on' : ''} onClick={() => setFilter(f)}>
                {f[0].toUpperCase()+f.slice(1)}
              </button>
            )}
          </div>
        </div>
      </div>

      <div className="side-list">
        {list.length === 0 ? (
          <div className="side-empty">
            <strong>No captures yet</strong>
            Drop a folder of photos to begin.
          </div>
        ) : list.map(c =>
          <CaptureCard key={c.id} c={c} active={c.id === activeId} onClick={() => setActiveId(c.id)}/>
        )}
      </div>

      <div className="side-foot">
        <span><span className="ok">●</span> backend ok</span>
        <span>:8000</span>
      </div>
    </aside>
  );
}

/* ----------------------------- Top bar ----------------------------- */
function TopBar({ active, onNew, onTests }) {
  return (
    <header className="topbar">
      <div className="brand">
        <BrandMark/>
        <div>
          <span className="brand-name">Pole<span className="dot">v</span>ision</span>
          <span className="brand-version">v0.4.2</span>
        </div>
      </div>
      <div className="topbar-center">
        <div className="crumbs">
          <span>workspace</span>
          <span className="sep">/</span>
          <span>captures</span>
          <span className="sep">/</span>
          <span className="now mono">{active?.id || '—'}</span>
        </div>
      </div>
      <div className="topbar-right">
        <button className="btn ghost"><Icon.refresh/> Sync</button>
        <button className="btn" onClick={onTests}><Icon.test/> Run tests</button>

        <button className="btn icon-only ghost" title="Settings"><Icon.gear/></button>

/* ----------------------------- Pipeline tab ----------------------------- */
function StatusPill({ s }) {
  if (s === 'ok')   return <span className="stage-status ok"><span className="pip"/>succeeded</span>;
  if (s === 'run')  return <span className="stage-status run"><span className="pip"/>running</span>;
  if (s === 'err')  return <span className="stage-status err"><span className="pip"/>failed</span>;
  return <span className="stage-status queued"><span className="pip"/>queued</span>;
}

function StageCard({ idx, stage, info, onRun, onCancel, params, setParams }) {
  const isActive = stage.s === 'run';
  return (
    <div className={`stage ${isActive ? 'is-active' : ''}`}>
      <div className="stage-head">
        <div style={{display:'flex', alignItems:'center', gap: 8}}>
          <span className="stage-num">{idx+1}</span>
          <span className="stage-name">{info.name}</span>
        </div>
        <StatusPill s={stage.s || 'queued'}/>
      </div>
      <div className="stage-body">
        <div style={{fontSize: 11.5, color: 'var(--text-4)', marginBottom: 8}}>{info.desc}</div>
        <div className="stage-row"><span className="k">elapsed</span><span className="v">{stage.s === 'run' ? 'running…' : stageMs(stage.ms)}</span></div>
        <div className="stage-row"><span className="k">last run</span><span className="v">{fmtTime(stage.t)}</span></div>
        {stage.s === 'err' ? (
          <div className="stage-row"><span className="k">exit</span><span className="v" style={{color:'var(--err)'}}>{stage.exit}</span></div>
        ) : (
          <div className="stage-row"><span className="k">artifact</span><span className="v">{stage.s === 'ok' ? `${info.id}.json` : '—'}</span></div>
        )}
        {info.id === 'fit' && (
          <div className="stage-row" style={{paddingTop: 6}}>
            <span className="k">object_id</span>
            <input
              type="number" min="0" max="20"
              value={params?.object_id ?? 0}
              onChange={e => setParams?.({ ...(params || {}), object_id: parseInt(e.target.value, 10) || 0 })}
              disabled={stage.s === 'run'}
              style={{width: 60, height: 22, padding: '0 6px',
                       background:'var(--bg-3)', border:'1px solid var(--line-2)',
                       borderRadius: 3, fontFamily:'var(--mono)', fontSize: 12,
                       color: 'var(--text)'}}/>
          </div>
        )}
        {stage.s === 'run' && (
          <div className="stage-bar"><i style={{width: `${(stage.progress || 0) * 100}%`}}/></div>
        )}
      </div>
      <div className="stage-foot">
        {stage.s === 'run' ? (
          <button className="btn ghost danger" onClick={() => onCancel?.(info.id)}>
            <Icon.pause/> Cancel
          </button>
        ) : stage.s === 'err' ? (
          <button className="btn" onClick={() => onRun?.(info.id)}><Icon.refresh/> Re-run</button>
        ) : stage.s === 'ok' ? (
          <button className="btn" onClick={() => onRun?.(info.id)}><Icon.refresh/> Re-run</button>
        ) : (
          <button className="btn" onClick={() => onRun?.(info.id)}><Icon.play/> Run</button>
        )}
      </div>
    </div>
  );
}

function PipelineTab({ capture, logs, onRunAll, onRunStage, onCancelStage,
                       stageParams, setStageParams }) {
  const stages = capture.stages;
  const failed = STAGES.find(s => stages[s.id]?.s === 'err');
  const running = STAGES.find(s => stages[s.id]?.s === 'run');
  return (
    <>
      <div className="pipeline-head">
        <div>
          <h3>Pipeline</h3>
          <div className="sub">
            {failed ? `failed at ${failed.name.toLowerCase()}` :
             running ? `running ${running.name.toLowerCase()}…` :
             STAGES.every(s => stages[s.id]?.s === 'ok') ? 'all stages complete' : 'idle'}
          </div>
        </div>
        <div className="flow-actions" style={{margin: 0}}>
          <div className="right">
            <button className="btn primary" onClick={onRunAll}><Icon.play/> Run all</button>
          </div>
        </div>
      </div>

      <div className="flow">
        {STAGES.map((info, i) =>
          <StageCard key={info.id} idx={i} info={info}
            stage={stages[info.id] || {s:'queued'}}
            onRun={onRunStage}
            onCancel={onCancelStage}
            params={stageParams?.[info.id]}
            setParams={(p) => setStageParams?.(info.id, p)}/>
        )}
      </div>

      <LogPanel logs={logs} runningStage={running?.name}/>
    </>
  );
}

/* ----------------------------- Log panel ----------------------------- */
function LogPanel({ logs, runningStage }) {

  useEffect(() => {
